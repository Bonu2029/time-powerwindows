<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>TP Windows & Doors</title>
  <script>
    // SPA fallback for root-level custom domain deployment.
    // Save the original path so index.html can restore it,
    // then redirect to the site root.
    sessionStorage.setItem("__spa_path",
      window.location.pathname + window.location.search + window.location.hash
    );
    window.location.replace("/");
  </script>
</head>
<body>
  Redirecting...
</body>
</html>
