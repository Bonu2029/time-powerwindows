<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>TP Windows & Doors</title>
  <script>
    // GitHub Pages SPA fallback: redirect any 404 path to index.html
    // so client-side routing (wouter) can handle it
    var path = window.location.pathname;
    var search = window.location.search;
    var hash = window.location.hash;
    sessionStorage.setItem("__spa_path", path + search + hash);
    window.location.replace("/");
  </script>
</head>
<body>
  Redirecting...
</body>
</html>
