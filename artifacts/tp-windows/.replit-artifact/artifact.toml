kind = "web"
previewPath = "/"
title = "TP Windows & Doors"
version = "1.0.0"
id = "artifacts/tp-windows"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25461

[services.development]
run = "pnpm --filter @workspace/tp-windows run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/tp-windows", "run", "build" ]
publicDir = "artifacts/tp-windows/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25461"
BASE_PATH = "/"
